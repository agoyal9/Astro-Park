<!doctype html>
<html>
  <head>
    <title>Astro Park | Customer Gift Shop</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="customer_giftshop.css" />
  </head>
  <body>
    <button
      class="back-button"
      type="button"
      onclick="window.location.href = 'customer.html'"
    >
      Back
    </button>

    <main class="shop-layout">
      <section class="shop-card">
        <div class="toolbar">
          <h2>Products</h2>
          <button type="button" id="refresh-btn">Refresh</button>
        </div>
        <p id="status-msg" class="status-msg"></p>
        <div id="product-grid" class="product-grid"></div>
      </section>

      <section class="shop-card">
        <h2>My Cart</h2>
        <ul id="cart-list" class="cart-list"></ul>
        <p class="total">Total: $<span id="cart-total">0.00</span></p>
        <button type="button" id="checkout-btn">Checkout</button>
        <button type="button" id="clear-cart-btn">Clear Cart</button>
      </section>
    </main>
    <script src="customer_giftshop.js"></script>
  </body>
</html>
